<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administracion</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<main class="container">
    <section class="panel">
        <h1>Dashboard Administrador</h1>
        <p class="muted">CRUD de directores, docentes y facultades.</p>
    </section>
    <section class="grid">
        <article class="panel">
            <h2>Facultades y directores</h2>
            <form th:action="@{/admin/catalogs/faculties}" th:object="${faculty}" method="post">
                <input type="hidden" th:field="*{id}">
                <label>Facultad</label>
                <input th:field="*{name}" required>
                <label>Director</label>
                <input th:field="*{directorName}">
                <button type="submit">Guardar facultad</button>
            </form>
        </article>
        <article class="panel">
            <h2>Docentes</h2>
            <form th:action="@{/admin/catalogs/teachers}" th:object="${teacher}" method="post">
                <input type="hidden" th:field="*{id}">
                <label>Nombre</label>
                <input th:field="*{name}" required>
                <label>Correo</label>
                <input th:field="*{email}" type="email">
                <label>Facultad</label>
                <select th:field="*{faculty}">
                    <option th:each="facultyItem : ${faculties}" th:value="${facultyItem.id}" th:text="${facultyItem.name}"></option>
                </select>
                <button type="submit">Guardar docente</button>
            </form>
        </article>
    </section>
    <section class="panel">
        <h2>Facultades registradas</h2>
        <table>
            <tr><th>Facultad</th><th>Director</th><th>Acciones</th></tr>
            <tr th:each="facultyItem : ${faculties}">
                <td th:text="${facultyItem.name}"></td>
                <td th:text="${facultyItem.directorName}"></td>
                <td>
                    <a th:href="@{/admin/catalogs/faculties/{id}/edit(id=${facultyItem.id})}">Editar</a>
                    <form th:action="@{/admin/catalogs/faculties/{id}/delete(id=${facultyItem.id})}" method="post" style="display:inline">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
    <section class="panel">
        <h2>Docentes registrados</h2>
        <table>
            <tr><th>Nombre</th><th>Correo</th><th>Facultad</th><th>Acciones</th></tr>
            <tr th:each="teacherItem : ${teachers}">
                <td th:text="${teacherItem.name}"></td>
                <td th:text="${teacherItem.email}"></td>
                <td th:text="${teacherItem.faculty != null ? teacherItem.faculty.name : 'Sin facultad'}"></td>
                <td>
                    <a th:href="@{/admin/catalogs/teachers/{id}/edit(id=${teacherItem.id})}">Editar</a>
                    <form th:action="@{/admin/catalogs/teachers/{id}/delete(id=${teacherItem.id})}" method="post" style="display:inline">
                        <button type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
</main>
</body>
</html>
